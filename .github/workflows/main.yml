name: Check Code Errors

on:
  workflow_dispatch: # Manually triggered event
  pull_request: # Trigger the workflow on pull requests

jobs:
  validate_python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Check for Python syntax errors (compileall)
        run: |
          # Recursively compiles all Python files in the directory.
          # Fails the workflow immediately if any syntax errors are found.
          python -m compileall -q .

      - name: Check for critical logic errors (flake8)
        run: |
          # Stops the build if there are syntax errors, missing imports, or undefined names.
          # The --select flag limits the check to critical errors only (ignoring minor styling issues).
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
